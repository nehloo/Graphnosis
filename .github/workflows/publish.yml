name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      # `id-token: write` is required for npm OIDC trusted publishing.
      # No NPM_TOKEN secret is used — npm authenticates via the GitHub Actions
      # OIDC token, which the npm trusted publisher configuration for
      # @nehloo/graphnosis maps to this repository and workflow filename.
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # OIDC trusted publishing requires npm >= 11.5.1. Node 22 ships with
      # npm 10.x, so we install a known-good npm 11.x explicitly. We pin
      # the major because `npm@latest` has periodically shipped broken
      # bundled deps (e.g. May 2026: missing `promise-retry` on the
      # nightly self-update).
      - name: Install npm 11.x
        run: npm install -g npm@^11

      - run: npm ci

      # No NODE_AUTH_TOKEN env — leaving it unset lets npm use OIDC.
      # `provenance: true` in package.json triggers attestation on the runner.
      - run: npm publish
