name: "CLA Assistant"
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

# explicitly configure permissions, in case your GITHUB_TOKEN workflow permissions are set to read-only in repository settings
permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PERSONAL_ACCESS_TOKEN: only needed if storing signatures in a different repo than this one
          # PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_SIGNATURES_TOKEN }}
        with:
          path-to-signatures: '.github/signatures/v1/cla.json'
          path-to-document: 'https://github.com/nehloo/Graphnosis/blob/main/CLA.md'
          branch: 'main'
          allowlist: nehloo,dependabot[bot],renovate[bot]
          # remote-organization-name: ''  # only needed if signatures live in a separate repo
          # remote-repository-name: ''
          custom-notsigned-prcomment: |
            Thanks for your pull request! Before we can merge, please read and sign the [Graphnosis Contributor License Agreement](https://github.com/nehloo/Graphnosis/blob/main/CLA.md).

            **To sign:** post the following comment on this PR:

            > I have read the CLA Document and I hereby sign the CLA

            One signature covers all your present and future contributions to this project. You only need to do this once.
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: '✅ All contributors have signed the CLA. Thanks!'
          lock-pullrequest-aftermerge: false
